project:
  type: website
  output-dir: docs
  resources:
    - CNAME
    - .nojekyll
    - assets/
  post-render:
    - python3 tools/clean_urls.py

lang: en-GB

website:
  title: "Sebastian Murk"
  site-url: https://sebastianmurk.com
  search: false
  plausible-analytics:
    path: _plausible_snippet.html
  navbar:
    title: false
    left:
      - href: /
        text: Home
      - href: /research/
        text: Research
      - href: /publications/
        text: Publications
      - href: /news/
        text: News
      - href: /talks/
        text: Talks
      - href: /travels/
        text: Travels
      - href: /photos/
        text: Photos

format:
  html:
    canonical-url: true
    toc: false
    theme:
      - cosmo
      - custom.scss
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
